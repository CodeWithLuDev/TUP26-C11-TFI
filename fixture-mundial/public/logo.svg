<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="dorado" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="50%" stop-color="#c9a227"/>
      <stop offset="100%" stop-color="#a07818"/>
    </linearGradient>
    <linearGradient id="fondo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a3a6e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#fondo)"/>

  <!-- Base de la copa -->
  <rect x="180" y="340" width="152" height="20" rx="4" fill="url(#dorado)"/>
  <rect x="200" y="320" width="112" height="24" rx="3" fill="url(#dorado)"/>

  <!-- Cuerpo principal -->
  <path d="M200 320 L210 200 L302 200 L312 320 Z" fill="none" stroke="url(#dorado)" stroke-width="8"/>

  <!-- Lineas horizontales en el cuerpo -->
  <line x1="210" y1="250" x2="302" y2="250" stroke="url(#dorado)" stroke-width="3"/>
  <line x1="206" y1="280" x2="306" y2="280" stroke="url(#dorado)" stroke-width="3"/>

  <!-- Arcos laterales (asas) -->
  <path d="M200 240 Q160 240 160 290 Q160 320 200 310" fill="none" stroke="url(#dorado)" stroke-width="6" stroke-linecap="round"/>
  <path d="M312 240 Q352 240 352 290 Q352 320 312 310" fill="none" stroke="url(#dorado)" stroke-width="6" stroke-linecap="round"/>

  <!-- Globo terráqueo arriba -->
  <circle cx="256" cy="140" r="55" fill="none" stroke="url(#dorado)" stroke-width="6"/>
  <ellipse cx="256" cy="140" rx="20" ry="55" fill="none" stroke="url(#dorado)" stroke-width="2"/>
  <ellipse cx="256" cy="140" rx="55" ry="20" fill="none" stroke="url(#dorado)" stroke-width="2"/>
  <line x1="201" y1="115" x2="311" y2="165" stroke="url(#dorado)" stroke-width="2"/>
  <line x1="201" y1="165" x2="311" y2="115" stroke="url(#dorado)" stroke-width="2"/>

  <!-- Estrella en el centro del globo -->
  <polygon points="256,125 261,140 276,140 264,150 268,166 256,156 244,166 248,150 236,140 251,140" fill="url(#dorado)"/>

  <!-- Etiqueta del año -->
  <rect x="210" y="370" width="92" height="36" rx="8" fill="#0a1628" stroke="url(#dorado)" stroke-width="3"/>
  <text x="256" y="395" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="url(#dorado)" text-anchor="middle">2026</text>
</svg>